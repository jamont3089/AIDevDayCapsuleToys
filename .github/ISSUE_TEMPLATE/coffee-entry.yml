name: Coffee giveaway entry
description: Put your name into the James Cafe coffee gacha.
title: "[Coffee Entry] "
labels:
  - coffee-entry
body:
  - type: markdown
    attributes:
      value: |
        ## Your capsule is almost ready

        Keep the `[Coffee Entry]` prefix in the title and add your name after it. Then create this issue to enter the James Cafe coffee giveaway at AI Dev Day.
  - type: input
    id: name
    attributes:
      label: Your name
      description: Enter the same name shown in the issue title.
      placeholder: Ada Lovelace
    validations:
      required: true
  - type: checkboxes
    id: agreement
    attributes:
      label: Giveaway terms
      options:
        - label: I am attending AI Dev Day and understand that my name will be public on GitHub.
          required: true
